version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: bus_tracking_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password_here
      MONGO_INITDB_DATABASE: bus_tracking
    volumes:
      - mongo_data:/data/db
    networks:
      - bus_network

  redis:
    image: redis:7-alpine
    container_name: bus_tracking_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis_password_here
    volumes:
      - redis_data:/data
    networks:
      - bus_network

  backend:
    build: ./backend
    container_name: bus_tracking_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:secure_password_here@mongodb:27017/bus_tracking?authSource=admin
      REDIS_URL: redis://:redis_password_here@redis:6379
      JWT_SECRET: your_jwt_secret_key_here
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    depends_on:
      - mongodb
      - redis
    networks:
      - bus_network

  nginx:
    image: nginx:alpine
    container_name: bus_tracking_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./admin-web:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - bus_network

volumes:
  mongo_data:
  redis_data:

networks:
  bus_network:
    driver: bridge
